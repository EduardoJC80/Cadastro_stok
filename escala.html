<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala SC-21 - Completa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .clock-container {
            font-size: 2rem; font-weight: 800; text-align: center; margin: 10px auto;
            color: #fff; background: #212529; padding: 5px 20px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: inline-block;
        }
        .table-main-container { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .table thead { background-color: #212529; color: white; position: sticky; top: 0; z-index: 10; }
        th { padding: 8px !important; text-align: center; font-size: 0.65rem; text-transform: uppercase; border: 1px solid #444; }
        td { vertical-align: middle; text-align: center; padding: 0 !important; height: 45px; font-weight: 600; border: 1px solid #dee2e6; font-size: 0.8rem; }
        
        input { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-weight: bold; color: inherit; outline: none; }
        .select-status { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-weight: bold; color: inherit; outline: none; cursor: pointer; }
        
        /* --- CORES DE STATUS SOLICITADAS --- */
        .status-operando { background-color: #32CD32 !important; color: #000 !important; }
        .status-liberando { background-color: #FF0000 !important; color: #FA8072 !important; }
        .status-disponivel { background-color: #FFFF00 !important; color: #000 !important; }
        .status-intervalo { background-color: #DAA520 !important; color: #fff !important; }
        .status-fechado, .status-ausente { background-color: #000000 !important; color: #ffffff !important; }

        /* Regra: Ausente/Fechado pinta a linha toda */
        .linha-bloqueada-status { background-color: #000000 !important; color: #ffffff !important; }
        .linha-bloqueada-status td, .linha-bloqueada-status input, .linha-bloqueada-status select { 
            background-color: #000000 !important; color: #ffffff !important; border-color: #333 !important;
        }

        /* Cores de Alerta de Horário */
        .hora-verde { background-color: #28a745 !important; color: white !important; }
        .hora-alerta-vermelho { background-color: #ff0000 !important; color: white !important; }
        .hora-fechada-preto { background-color: #000000 !important; color: white !important; }
        
        .col-nome { min-width: 250px; text-align: left; padding-left: 10px !important; background-color: #fff; text-transform: uppercase; font-size: 0.75rem; }
        .editable-name { background-color: #fffde7 !important; cursor: text; border: 1px dashed #fbc02d !important; }
        .input-igual { background-color: #8B0000 !important; color: #FFCCCB !important; }
        .col-obs-sep { width: 40px; background-color: #f1f1f1 !important; border-left: 2px solid #212529 !important; border-right: 2px solid #212529 !important; }

        .btn-add-row { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; }
        .swal-input-label { text-align: left; font-weight: bold; display: block; margin-top: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container-fluid py-2">
    <div class="text-center mb-2">
        <h5 class="fw-bold m-0">FRENTE DE CAIXA - SC-21</h5>
        <div id="clock" class="clock-container">00:00:00</div>
        <div class="mt-1">
            <button class="btn btn-sm btn-danger" onclick="limparDados()">Limpar Escala do Dia</button>
            <button class="btn btn-sm btn-success" onclick="exportarExcel()">Salvar Excel (XLS)</button>
        </div>
    </div>

    <div class="table-main-container">
        <div class="table-responsive" style="max-height: 85vh;">
            <table class="table table-bordered m-0">
                <thead>
                    <tr>
                        <th>Mat.</th>
                        <th class="col-nome">Nome</th>
                        <th>Situação</th>
                        <th>Caixa</th>
                        <th>Início</th>
                        <th>Int.</th>
                        <th>Volta</th>
                        <th>Saída</th>
                        <th class="col-obs-sep"></th>
                        <th class="table-dark">Real Ent.</th>
                        <th class="table-dark">Real Int.</th>
                        <th class="table-dark">Real Vol.</th>
                        <th class="table-dark">Real Sai.</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo"></tbody>
            </table>
        </div>
    </div>
</div>

<button class="btn btn-primary btn-add-row" onclick="abrirModalNovo()">+</button>

        { mat: "242602", nome: "ANA CLAUDIA DE OLIVEIRA FERREIRA", h: ["12:00", "14:00", "16:00", "22:00"] },
        { mat: "246146", nome: "ANA CAROLINA QUARESMA DA SILVA", h: ["12:00", "14:00", "16:00", "22:00"] },
        { mat: "236340", nome: "ALINE DE OLIVEIRA", h: ["12:00", "14:00", "16:00", "22:00"] },
        { mat: "225467", nome: "ADRIANE CORTES MARTINS", h: ["12:00", "14:00", "16:00", "22:00"] },
        { mat: "GOLD21026", nome: "GOLD26", h: ["FOLGA", "-", "-", "-"] },
        { mat: "GOLD21025", nome: "GOLD25", h: ["FOLGA", "-", "-", "-"] }
    ];

    const corpo = document.getElementById('tabela-corpo');

    function criarLinha(f, idx, isExtra = false) {
        const tr = document.createElement('tr');
        tr.className = 'row-funcionario';
        tr.dataset.id = isExtra ? "extra_" + Date.now() : f.mat;
        
        const isGold = f.mat && f.mat.startsWith("GOLD");
        const nomeEditavel = (isGold || isExtra) ? `contenteditable="true" class="col-nome editable-name" onblur="salvarDados()"` : `class="col-nome"`;

        tr.innerHTML = `
            <td style="background:#eee; font-size: 0.65rem">${f.mat.split('_')[0]}</td>
            <td ${nomeEditavel}>${f.nome}</td>
            <td class="td-status">
                <select class="select-status" onchange="atualizarS(this); salvarDados()">
                    <option value="">---</option>
                    <option value="status-operando">OPERANDO</option>
                    <option value="status-disponivel">DISPONÍVEL</option>
                    <option value="status-intervalo">INTERVALO</option>
                    <option value="status-liberando">LIBERANDO</option>
                    <option value="status-fechado">FECHADO</option>
                    <option value="status-ausente">AUSENTE</option>
                </select>
            </td>
            <td><input type="text" class="input-caixa" value="${f.caixa || ''}" oninput="salvarDados(); validarDuplicados()"></td>
            <td class="c-h">${f.h[0]}</td><td class="c-h">${f.h[1]}</td>
            <td class="c-h">${f.h[2]}</td><td class="c-h">${f.h[3]}</td>
            <td class="col-obs-sep"><input type="text" disabled></td>
            <td class="c-h-real"><input type="time" oninput="salvarDados()"></td>
            <td class="c-h-real"><input type="time" oninput="salvarDados()"></td>
            <td class="c-h-real"><input type="time" oninput="salvarDados()"></td>
            <td class="c-h-real"><input type="time" oninput="salvarDados()"></td>
        `;
        corpo.appendChild(tr);
        return tr;
    }

    function atualizarS(e) {
        const tr = e.closest('tr');
        const val = e.value;
        tr.classList.remove('linha-bloqueada-status');
        e.parentElement.className = 'td-status ' + val;
        if (val === 'status-ausente' || val === 'status-fechado') tr.classList.add('linha-bloqueada-status');
    }

    async function abrirModalNovo() {
        const { value: f } = await Swal.fire({
            title: 'Novo Colaborador',
            html: `
                <div style="text-align: left;">
                    <label class="swal-input-label">Nome Completo</label>
                    <input id="swal-nome" class="swal2-input" style="width: 90%" placeholder="Nome">
                    <label class="swal-input-label">Matrícula</label>
                    <input id="swal-mat" class="swal2-input" style="width: 90%" placeholder="000">
                    <div style="display: flex; gap: 10px;">
                        <div style="flex:1"><label class="swal-input-label">Início</label><input type="time" id="swal-h1" class="swal2-input" style="width:100%"></div>
                        <div style="flex:1"><label class="swal-input-label">Saída</label><input type="time" id="swal-h4" class="swal2-input" style="width:100%"></div>
                    </div>
                </div>
            `,
            confirmButtonText: 'Adicionar',
            preConfirm: () => {
                const n = document.getElementById('swal-nome').value;
                if (!n) return Swal.showValidationMessage('Nome é obrigatório');
                return {
                    nome: n.toUpperCase(),
                    mat: document.getElementById('swal-mat').value || 'EXTRA',
                    h: [document.getElementById('swal-h1').value || "-", "-", "-", document.getElementById('swal-h4').value || "-"]
                }
            }
        });
        if (f) { criarLinha(f, 0, true); salvarDados(); }
    }

    function salvarDados() {
        const dados = [];
        document.querySelectorAll('.row-funcionario').forEach(tr => {
            dados.push({
                id: tr.dataset.id,
                nome: tr.cells[1].innerText,
                status: tr.querySelector('.select-status').value,
                caixa: tr.querySelector('.input-caixa').value,
                reais: Array.from(tr.querySelectorAll('.c-h-real input')).map(i => i.value)
            });
        });
        localStorage.setItem('escala_sc21_final', JSON.stringify(dados));
    }

    function carregarDados() {
        const storage = localStorage.getItem('escala_sc21_final');
        if (!storage) return;
        const dados = JSON.parse(storage);
        document.querySelectorAll('.row-funcionario').forEach(tr => {
            const d = dados.find(x => x.id === tr.dataset.id);
            if (d) {
                tr.cells[1].innerText = d.nome;
                const sel = tr.querySelector('.select-status');
                sel.value = d.status;
                tr.querySelector('.input-caixa').value = d.caixa;
                const inputs = tr.querySelectorAll('.c-h-real input');
                d.reais.forEach((v, i) => inputs[i].value = v);
                atualizarS(sel);
            }
        });
    }

    function monitorar() {
        const agora = new Date();
        document.getElementById('clock').textContent = agora.toLocaleTimeString('pt-BR');
        document.querySelectorAll('.row-funcionario').forEach(linha => {
            if (linha.classList.contains('linha-bloqueada-status')) return;
            linha.querySelectorAll('.c-h').forEach(c => {
                const d = diffM(c.innerText, agora);
                if (d < -15) c.className = "c-h hora-fechada-preto";
                else if (d <= 15 && d >= -15) c.className = "c-h hora-alerta-vermelho";
                else c.className = "c-h hora-verde";
            });
        });
    }

    function diffM(h, ag) {
        if (!h || h.length < 5 || h === "FOLGA") return 999;
        const [hh, mm] = h.split(':').map(Number);
        const r = new Date(ag); r.setHours(hh, mm, 0, 0);
        return Math.floor((r - ag) / 60000);
    }

    function validarDuplicados() {
        const inputs = document.querySelectorAll('.input-caixa');
        const vals = Array.from(inputs).map(i => i.value.trim());
        inputs.forEach(i => i.classList.toggle('input-igual', i.value !== "" && vals.filter(v => v === i.value).length > 1));
    }

    function exportarExcel() {
        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
        XLSX.writeFile(wb, "Escala_SC21_Final.xlsx");
    }

    function limparDados() {
        Swal.fire({ title: 'Limpar tudo?', icon: 'warning', showCancelButton: true }).then(r => {
            if(r.isConfirmed) { localStorage.removeItem('escala_sc21_final'); location.reload(); }
        });
    }

    // Inicializar
    funcionariosBase.forEach((f, idx) => criarLinha(f, idx));
    carregarDados();
    setInterval(monitorar, 1000);
    monitorar();
</script>
</body>
</html>
